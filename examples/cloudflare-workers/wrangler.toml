name = "hono-stripe-example"
main = "src/index.tsx"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]

# Secrets are NOT set here. For local dev put them in `.dev.vars` (see
# `.dev.vars.example`). For production set them with:
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#
# The publishable key (pk_test_...) is not a secret — it is sent to the browser.
# It is read from a plain var here so the frontend can pick it up.
[vars]
STRIPE_PUBLISHABLE_KEY = "pk_test_replace_me"
