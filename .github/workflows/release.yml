# Release workflow (provenance-enabled publish).
#
# Publishes to npm with provenance (package.json sets publishConfig.provenance).
# Requires an NPM_TOKEN secret with publish rights. `id-token: write` is what
# lets npm attach the provenance attestation.
#
# NOTE: the first publish of the `hono-stripe` name (HID-262) is done manually
# by a maintainer who holds npm credentials; this workflow handles subsequent
# tagged releases.
name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
