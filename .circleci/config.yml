# CircleCI: bundle-size guard for hono-stripe.
#
# hono-stripe is meant to stay thin (peer deps only, stripe/hono externalized
# in tsup). This pipeline builds the package, enforces a brotli size budget with
# size-limit (.size-limit.json), and posts the current sizes back to the PR
# using the GitHub CLI.
#
# The size report is posted to the PR *before* the budget is enforced, so an
# over-budget PR still gets the report comment and then fails. Commenting is
# best-effort: missing token (fork PRs) or a transient GitHub error is a warning,
# never a hard build failure — only the size budget fails the job.
#
# Prerequisites (set up once by a maintainer — cannot be done in code):
#   1. Enable this repository as a CircleCI project (CircleCI GitHub App).
#   2. Add a GITHUB_TOKEN env var (a PAT with `pull_requests: write` / `repo`)
#      to the CircleCI project or a context. The gh CLI reads it from the
#      environment to post the size report. On fork PRs the token is absent and
#      the comment step is skipped (the size budget is still enforced).
version: 2.1

orbs:
  gh: circleci/github-cli@2.3.0

jobs:
  size:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      # Match package.json's packageManager (pnpm@11.7.0) exactly.
      - run:
          name: Enable pnpm
          command: |
            corepack enable
            corepack prepare pnpm@11.7.0 --activate
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - run:
          name: Build
          command: pnpm run build
      # Install gh (no auth here — gh reads GITHUB_TOKEN from the env when set,
      # so this step is safe even on fork PRs where no token is available).
      - gh/install
      - run:
          name: Measure bundle size, comment on PR, then enforce budget
          command: |
            # Measure but DON'T abort yet: capture the exit code so we can post
            # the report before failing on an over-budget PR.
            SIZE_EXIT=0
            pnpm exec size-limit --json > size.json || SIZE_EXIT=$?

            # Build the report (also echoed to the build log via tee).
            {
              echo "<!-- size-limit-report -->"
              echo "## 📦 Bundle size (size-limit)"
              echo ""
              echo "| File | Size | Limit | Status |"
              echo "| -- | -- | -- | -- |"
              jq -r '.[] | "| \(.name) | \(.size) B | \(.sizeLimit) B | \(if .passed then "✅" else "❌" end) |"' size.json
            } | tee body.md

            # Post to the PR — best effort only. Skipped on non-PR builds and on
            # fork PRs (no token); a transient failure is a warning, not fatal.
            if [ -n "$CIRCLE_PULL_REQUEST" ] && { [ -n "$GITHUB_TOKEN" ] || [ -n "$GH_TOKEN" ]; }; then
              gh pr comment "$CIRCLE_PULL_REQUEST" --body-file body.md --edit-last \
                || gh pr comment "$CIRCLE_PULL_REQUEST" --body-file body.md \
                || echo "Warning: failed to post the bundle-size comment."
            else
              echo "Skipping PR comment (not a PR build, or no GITHUB_TOKEN/GH_TOKEN — e.g. fork PR)."
            fi

            # Enforce the budget last, so the report is always posted first.
            exit "$SIZE_EXIT"

workflows:
  bundle-size:
    jobs:
      - size
